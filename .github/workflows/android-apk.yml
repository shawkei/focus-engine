name: Build Android APK (Stable)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Node setup
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3) Java setup
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4) Install dependencies
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      # 5) Fix recharts dependency
      - name: Fix missing dependency
        run: npm install react-is --legacy-peer-deps

      # 6) Build web app
      - name: Build web app
        run: |
          rm -rf dist
          npm run build

      # 7) Check dist
      - name: Check dist
        run: ls -la dist

      # ✅ 8) توليد الأيقونات (المهم جدًا)
      - name: Generate App Icons
        run: npx @capacitor/assets generate

      # 9) Fix Gradle Wrapper
      - name: Fix Gradle Wrapper
        run: |
          cd android
          rm -rf gradle/wrapper/gradle-wrapper.jar
          curl -L https://services.gradle.org/distributions/gradle-8.13-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /tmp/gradle
          export PATH=$PATH:/tmp/gradle/gradle-8.13/bin
          gradle wrapper --gradle-version 8.13

      # 10) Sync Capacitor
      - name: Sync Capacitor
        run: |
          rm -rf android/app/src/main/assets/public
          npx cap sync android

      # 11) Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 12) Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
