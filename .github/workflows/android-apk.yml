name: Build Android APK

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 🔴 أهم خطوة: منع optional deps بالكامل أثناء install
      - name: Install dependencies safely
        run: |
          npm ci --legacy-peer-deps --omit=optional

      # 🔴 ضمان عدم تحميل native bindings
      - name: Force clean rebuild of node modules
        run: npm rebuild

      # 🔴 بناء الويب
      - name: Build web app
        run: npm run build

      # 🔴 Capacitor sync
      - name: Sync Capacitor
        run: npx cap sync android

      # 🔴 بناء APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 🔴 رفع APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
