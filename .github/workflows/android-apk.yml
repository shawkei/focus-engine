name: Build Android APK (Stable)

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2) Node setup (Capacitor + Vite compatible)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 3) Java setup (Gradle 8.13 compatible)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 4) Install dependencies clean
      - name: Install dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm cache clean --force
          npm install --legacy-peer-deps

      # 5) Fix missing react-is dependency (recharts fix)
      - name: Fix missing dependency
        run: npm install react-is --legacy-peer-deps

      # 6) Build web app (Vite)
      - name: Build web app
        run: |
          rm -rf dist
          npm run build

      # 7) Verify build output
      - name: Check dist
        run: ls -la dist

      # 8) Fix broken Gradle wrapper (CRITICAL FIX)
      - name: Fix Gradle Wrapper
        run: |
          cd android
          rm -rf gradle/wrapper/gradle-wrapper.jar
          curl -L https://services.gradle.org/distributions/gradle-8.13-bin.zip -o gradle.zip
          unzip -q gradle.zip -d /tmp/gradle
          export PATH=$PATH:/tmp/gradle/gradle-8.13/bin
          gradle wrapper --gradle-version 8.13

      # 9) Capacitor sync (clean assets)
      - name: Sync Capacitor
        run: |
          rm -rf android/app/src/main/assets/public
          npx cap sync android

      # 10) Build APK
      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      # 11) Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
